databaseChangeLog:
  - changeSet:
      id: 002-create-books-table
      author: nargiz

      changes:
        - createTable:
            tableName: books

            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: author
                  type: VARCHAR(150)
                  constraints:
                    nullable: false

              - column:
                  name: isbn
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: total_copies
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: available_copies
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: published_year
                  type: INT

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: books
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_books_category

        - createIndex:
            tableName: books
            indexName: idx_books_title
            columns:
              - column:
                  name: title

        - createIndex:
            tableName: books
            indexName: idx_books_author
            columns:
              - column:
                  name: author

        - createIndex:
            tableName: books
            indexName: idx_books_category
            columns:
              - column:
                  name: category_id