databaseChangeLog:
  - changeSet:
      id: 002-create-borrow-histories-table
      author: nargiz
      changes:
        - createTable:
            tableName: borrow_histories
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: book_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: book_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: borrowed_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: returned_at
                  type: TIMESTAMP

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: borrow_histories
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_borrow_histories_user