spring:
  application:
    name: user-service


  datasource:
    url: jdbc:postgresql://localhost:5432/users_db
    username: postgres
    password: 123456

  jpa:
    hibernate:
      ddl-auto: validate

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1s
          multiplier: 2
          max-interval: 10s
          max-retries: 3

server:
  port: 8081

